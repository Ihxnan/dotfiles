# : Manager [[[

[mgr]
cwd = { fg = "#dee4e1" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#63b7ff", bg = "#63b7ff" }
marker_cut      = { fg = "#c9e6ff", bg = "#c9e6ff" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#abcae4", bg = "#abcae4" }

# Count
count_copied   = { fg = "#001e2f", bg = "#c9e6ff" }
count_cut      = { fg = "#001e2f", bg = "#c9e6ff" }
count_selected = { fg = "#00382f", bg = "#abcae4" }

# Border
border_symbol = "│"
border_style  = { fg = "#84d5c4" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#84d5c4", bold = true, bg = "#0e1513" }
inactive  = { fg = "#b1ccc4", bg = "#0e1513" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#84d5c4", fg = "#00382f", bold = true }
normal_alt  = { bg = "#3f4946", fg = "#bec9c5" }

# Select mode
select_main = { bg = "#b1ccc4", fg = "#1c352f", bold = true }
select_alt  = { bg = "#3f4946", fg = "#bec9c5" }

# Unset mode
unset_main = { bg = "#abcae4", fg = "#123348", bold = true }
unset_alt  = { bg = "#3f4946", fg = "#bec9c5" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#5a8a7c" }
perm_write = { fg = "#3c81ba" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#309fff" }
perm_sep   = { fg = "#1edbaf" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#84d5c4", bg = "#343b38" }
progress_error  = { fg = "#ffb4ab", bg = "#343b38" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#343b38" }
cand = { fg = "#84d5c4" }
rest = { fg = "#00382f" }
desc = { fg = "#dee4e1" }
separator = " ▶ "
separator_style = { fg = "#dee4e1" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#abcae4" }
title_warn  = { fg = "#84d5c4" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#84d5c4" }
active = { fg = "#abcae4", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#84d5c4" }
value  = { fg = "#dee4e1" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#84d5c4", bg = "#00382f" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#84d5c4" }
title   = {}
hovered = { fg = "#c9e6ff", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#dee4e1" }
run    = { fg = "#dee4e1" }
footer = { fg = "#1c352f", bg = "#b1ccc4" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#dee4e1" },
    { url = "*/", fg = "#84d5c4" },
]


# : ]]]
# : Icon [[[

[icon]
# ==========================================
# 1. 预设条件 (最高优先级)
# ==========================================
prepend_conds = [
    # 隐藏的文件夹 (半透明或较暗的颜色)
    { if = "dir & hidden", text = "", fg = "#d0efe8" },
    
    # 普通文件夹 - 提到前面来，确保文件夹图标最先被匹配
    { if = "dir", text = "", fg = "#84d5c4" },
    
    # 损坏的符号链接 (孤儿) - 使用 Error 色
    { if = "orphan", text = "󰌌", fg = "#ffb4ab" },
    # 正常的符号链接 - 使用 Tertiary 固定色
    { if = "link", text = "󰌷", fg = "#c9e6ff" },
    
    # 可执行文件 - 【关键修复：必须排除文件夹 (!dir)】
    { if = "exec & !dir", text = "󰆧", fg = "#b1ccc4" },

    # 普通隐藏文件 (暗淡的文字色)
    { if = "hidden", text = "󰈙", fg = "#bec9c5" },
]

# ==========================================
# 2. 预设目录 (特殊文件夹图标与主色调)
# ==========================================
prepend_dirs = [
    # 使用 Primary 颜色高亮常用主目录
    { name = "Desktop", text = "", fg = "#84d5c4" },
    { name = "Documents", text = "󰈙", fg = "#84d5c4" },
    { name = "Downloads", text = "󰇚", fg = "#84d5c4" },
    { name = "Pictures", text = "󰉏", fg = "#84d5c4" },
    { name = "Music", text = "󰎆", fg = "#84d5c4" },
    { name = "Videos", text = "󰕧", fg = "#84d5c4" },
    { name = "Public", text = "", fg = "#84d5c4" },

    # 使用 Secondary 颜色标记开发/配置目录
    { name = ".config", text = "", fg = "#b1ccc4" },
    { name = ".git", text = "󰊢", fg = "#b1ccc4" },
    { name = "Github", text = "󰊢", fg = "#b1ccc4" },
    { name = "src", text = "", fg = "#b1ccc4" },
]

# ==========================================
# 3. 预设文件扩展名
# ==========================================
prepend_exts = [
    # 图片/媒体 - 使用 Tertiary 颜色 (提供视觉对比)
    { name = "png", text = "󰉏", fg = "#abcae4" },
    { name = "jpg", text = "󰉏", fg = "#abcae4" },
    { name = "jpeg", text = "󰉏", fg = "#abcae4" },
    { name = "webp", text = "󰉏", fg = "#abcae4" },
    { name = "svg", text = "󰜡", fg = "#abcae4" },
    { name = "mp4", text = "󰕧", fg = "#abcae4" },
    { name = "mkv", text = "󰕧", fg = "#abcae4" },
    { name = "mp3", text = "󰎆", fg = "#abcae4" },
    { name = "flac", text = "󰎆", fg = "#abcae4" },

    # 档案/压缩包 - 使用 Error Container 相关的颜色 (以示区别，或可选 tertiary_fixed)
    { name = "zip", text = "󰛫", fg = "#abcae4" },
    { name = "tar", text = "󰛫", fg = "#abcae4" },
    { name = "gz", text = "󰛫", fg = "#abcae4" },
    { name = "rar", text = "󰛫", fg = "#abcae4" },
    { name = "7z", text = "󰛫", fg = "#abcae4" },

    # 常用代码/配置文件 - 使用 Primary 或 On Surface 色
    { name = "conf", text = "", fg = "#84d5c4" },
    { name = "toml", text = "", fg = "#84d5c4" },
    { name = "yaml", text = "", fg = "#84d5c4" },
    { name = "yml", text = "", fg = "#84d5c4" },
    { name = "json", text = "", fg = "#84d5c4" },
    { name = "sh", text = "", fg = "#84d5c4" },
    { name = "bash", text = "", fg = "#84d5c4" },
    { name = "py", text = "", fg = "#84d5c4" },
    { name = "rs", text = "", fg = "#84d5c4" },
    { name = "c", text = "", fg = "#84d5c4" },
    { name = "cpp", text = "", fg = "#84d5c4" },
    { name = "md", text = "", fg = "#84d5c4" },
    { name = "txt", text = "󰈙", fg = "#dee4e1" },
]

# ==========================================
# 4. 预设特定文件名
# ==========================================
prepend_files = [
    { name = "PKGBUILD", text = "", fg = "#84d5c4" },
    { name = "README.md", text = "󰂺", fg = "#b1ccc4" },
    { name = "Makefile", text = "", fg = "#b1ccc4" },
    { name = ".bashrc", text = "", fg = "#b1ccc4" },
    { name = ".zshrc", text = "", fg = "#b1ccc4" },
]

# : ]]]
