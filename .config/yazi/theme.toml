# : Manager [[[

[mgr]
cwd = { fg = "#e5e1e9" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#ff72ac", bg = "#ff72ac" }
marker_cut      = { fg = "#ffd8e8", bg = "#ffd8e8" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#ecb8cf", bg = "#ecb8cf" }

# Count
count_copied   = { fg = "#301122", bg = "#ffd8e8" }
count_cut      = { fg = "#301122", bg = "#ffd8e8" }
count_selected = { fg = "#2f295f", bg = "#ecb8cf" }

# Border
border_symbol = "│"
border_style  = { fg = "#c6bfff" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#c6bfff", bold = true, bg = "#141318" }
inactive  = { fg = "#c8c3dc", bg = "#141318" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#c6bfff", fg = "#2f295f", bold = true }
normal_alt  = { bg = "#47464f", fg = "#c9c5d0" }

# Select mode
select_main = { bg = "#c8c3dc", fg = "#302e41", bold = true }
select_alt  = { bg = "#47464f", fg = "#c9c5d0" }

# Unset mode
unset_main = { bg = "#ecb8cf", fg = "#482537", bold = true }
unset_alt  = { bg = "#47464f", fg = "#c9c5d0" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#6f62a4" }
perm_write = { fg = "#cc3f7d" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#ff3f8e" }
perm_sep   = { fg = "#6346ff" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#c6bfff", bg = "#3a383e" }
progress_error  = { fg = "#ffb4ab", bg = "#3a383e" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3a383e" }
cand = { fg = "#c6bfff" }
rest = { fg = "#2f295f" }
desc = { fg = "#e5e1e9" }
separator = " ▶ "
separator_style = { fg = "#e5e1e9" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#ecb8cf" }
title_warn  = { fg = "#c6bfff" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#c6bfff" }
active = { fg = "#ecb8cf", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#c6bfff" }
value  = { fg = "#e5e1e9" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#c6bfff", bg = "#2f295f" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#c6bfff" }
title   = {}
hovered = { fg = "#ffd8e8", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#e5e1e9" }
run    = { fg = "#e5e1e9" }
footer = { fg = "#302e41", bg = "#c8c3dc" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#e5e1e9" },
    { url = "*/", fg = "#c6bfff" },
]


# : ]]]
# : Icon [[[

[icon]
# ==========================================
# 1. 预设条件 (最高优先级)
# ==========================================
prepend_conds = [
    # 隐藏的文件夹 (半透明或较暗的颜色)
    { if = "dir & hidden", text = "", fg = "#ffffff" },
    
    # 普通文件夹 - 提到前面来，确保文件夹图标最先被匹配
    { if = "dir", text = "", fg = "#c6bfff" },
    
    # 损坏的符号链接 (孤儿) - 使用 Error 色
    { if = "orphan", text = "󰌌", fg = "#ffb4ab" },
    # 正常的符号链接 - 使用 Tertiary 固定色
    { if = "link", text = "󰌷", fg = "#ffd8e8" },
    
    # 可执行文件 - 【关键修复：必须排除文件夹 (!dir)】
    { if = "exec & !dir", text = "󰆧", fg = "#c8c3dc" },

    # 普通隐藏文件 (暗淡的文字色)
    { if = "hidden", text = "󰈙", fg = "#c9c5d0" },
]

# ==========================================
# 2. 预设目录 (特殊文件夹图标与主色调)
# ==========================================
prepend_dirs = [
    # 使用 Primary 颜色高亮常用主目录
    { name = "Desktop", text = "", fg = "#c6bfff" },
    { name = "Documents", text = "󰈙", fg = "#c6bfff" },
    { name = "Downloads", text = "󰇚", fg = "#c6bfff" },
    { name = "Pictures", text = "󰉏", fg = "#c6bfff" },
    { name = "Music", text = "󰎆", fg = "#c6bfff" },
    { name = "Videos", text = "󰕧", fg = "#c6bfff" },
    { name = "Public", text = "", fg = "#c6bfff" },

    # 使用 Secondary 颜色标记开发/配置目录
    { name = ".config", text = "", fg = "#c8c3dc" },
    { name = ".git", text = "󰊢", fg = "#c8c3dc" },
    { name = "Github", text = "󰊢", fg = "#c8c3dc" },
    { name = "src", text = "", fg = "#c8c3dc" },
]

# ==========================================
# 3. 预设文件扩展名
# ==========================================
prepend_exts = [
    # 图片/媒体 - 使用 Tertiary 颜色 (提供视觉对比)
    { name = "png", text = "󰉏", fg = "#ecb8cf" },
    { name = "jpg", text = "󰉏", fg = "#ecb8cf" },
    { name = "jpeg", text = "󰉏", fg = "#ecb8cf" },
    { name = "webp", text = "󰉏", fg = "#ecb8cf" },
    { name = "svg", text = "󰜡", fg = "#ecb8cf" },
    { name = "mp4", text = "󰕧", fg = "#ecb8cf" },
    { name = "mkv", text = "󰕧", fg = "#ecb8cf" },
    { name = "mp3", text = "󰎆", fg = "#ecb8cf" },
    { name = "flac", text = "󰎆", fg = "#ecb8cf" },

    # 档案/压缩包 - 使用 Error Container 相关的颜色 (以示区别，或可选 tertiary_fixed)
    { name = "zip", text = "󰛫", fg = "#ecb8cf" },
    { name = "tar", text = "󰛫", fg = "#ecb8cf" },
    { name = "gz", text = "󰛫", fg = "#ecb8cf" },
    { name = "rar", text = "󰛫", fg = "#ecb8cf" },
    { name = "7z", text = "󰛫", fg = "#ecb8cf" },

    # 常用代码/配置文件 - 使用 Primary 或 On Surface 色
    { name = "conf", text = "", fg = "#c6bfff" },
    { name = "toml", text = "", fg = "#c6bfff" },
    { name = "yaml", text = "", fg = "#c6bfff" },
    { name = "yml", text = "", fg = "#c6bfff" },
    { name = "json", text = "", fg = "#c6bfff" },
    { name = "sh", text = "", fg = "#c6bfff" },
    { name = "bash", text = "", fg = "#c6bfff" },
    { name = "py", text = "", fg = "#c6bfff" },
    { name = "rs", text = "", fg = "#c6bfff" },
    { name = "c", text = "", fg = "#c6bfff" },
    { name = "cpp", text = "", fg = "#c6bfff" },
    { name = "md", text = "", fg = "#c6bfff" },
    { name = "txt", text = "󰈙", fg = "#e5e1e9" },
]

# ==========================================
# 4. 预设特定文件名
# ==========================================
prepend_files = [
    { name = "PKGBUILD", text = "", fg = "#c6bfff" },
    { name = "README.md", text = "󰂺", fg = "#c8c3dc" },
    { name = "Makefile", text = "", fg = "#c8c3dc" },
    { name = ".bashrc", text = "", fg = "#c8c3dc" },
    { name = ".zshrc", text = "", fg = "#c8c3dc" },
]

# : ]]]
