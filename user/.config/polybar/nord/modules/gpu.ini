[module/gpu]
type = custom/script
exec = ~/.scripts/gpu/gpu.sh
interval = 1

format = <label>
format-prefix = %{T5}⚡%{T-}
format-prefix-background = ${colors.blue}
format-prefix-foreground = ${colors.bg}
format-prefix-padding = 0
label = %{T8}%output%%{T-}
label-background = ${colors.bg-alt}
label-foreground = ${colors.fg}
label-padding = 1
